name: test-failure

on:
  push:
    branches:
      - main

  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Create failing test
        run: |
          python -c 'from pathlib import Path; Path("test_failure_example.py").write_text("def test_intentional_failure():\n    assert False, \"Intentional failing test for DevOps investigation\"\n")'

      - name: Run tests
        run: pytest -q
